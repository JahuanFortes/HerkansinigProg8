<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> </title>
    <script src="scripts/app.js" type="module" defer></script>
    <!-- Marked.js voor markdown -->
    <script
      src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"
      defer
    ></script>
    <!-- Dom purify voor validatie html -->
    <script
      src="
https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js
"
      defer
    ></script>

    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <main>
      <div class="app">
        <div class="header">
          <div class="container">
            <h1 class="title">"You look lonely, I can fix that." LLM</h1>
            <button class="clear-button hidden" id="clearButton">
              Clear Chat
            </button>
          </div>
        </div>

        <div class="container chat" id="chat"></div>

        <form class="form">
          <div class="container">
            <label for="inputMessage"></label>
            <input
              type="text"
              placeholder="Type a message..."
              class="input-field"
              name="inputMessage"
              id="inputMessage"
              required
            />
            <button type="submit" id="submit" class="submit-button">
              Send
            </button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
